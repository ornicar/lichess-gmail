<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 12px;
      margin: 0;
      font-size: 13px;
      color: #333;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 12px;
      color: #666;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      margin-bottom: 8px;
    }
    textarea:focus {
      outline: none;
      border-color: #3893e8;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      background: #3893e8;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2d7ed3; }
    .status { font-size: 12px; color: #0a7; }
    a {
      font-size: 11px;
      color: #666;
      text-decoration: none;
      margin-left: auto;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <label for="signature">Email signature</label>
  <textarea id="signature" placeholder="--&#10;Regards,&#10;Lichess mod team"></textarea>
  <div class="row">
    <button id="save">Save</button>
    <span id="status" class="status"></span>
    <a id="options-link" href="#">More options</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
